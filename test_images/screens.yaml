# Screen states for Pokemon Champions VGC
# Source of truth for detection, reading, testing, and state machine.
#
# Every screen directory in test_images/ maps 1:1 to an entry here.
# Detectors return bool (true on registered screens, false on all others).
# Readers extract structured data; field schemas define manifest shape.

screens:

  # ── Pre-battle ──────────────────────────────────────────────

  team_select:
    description: "Registering team of 6 (selecting which mons make up Team 1, etc.)."
    transitions_to: [pre_match]
    detectors: [TeamSelectDetector]
    readers:
      TeamSelectReader:
        fields:
          species:
            type: array
            items: string
            length: 6

  searching_for_battle:
    description: "Animation/transition after pressing Begin Matchmaking."
    transitions_to: [team_preview_selecting]
    detectors: []
    readers: {}

  team_preview_selecting:
    description: "Choosing which 4 mons to bring. Opponent team visible. No Standing By pills."
    transitions_to: [team_preview_locked_in]
    detectors: [TeamPreviewDetector]
    readers:
      TeamPreviewReader:
        fields:
          own_species:
            type: array
            items: string
            length: 6
          opponent_species:
            type: array
            items: string
            length: 6

  team_preview_locked_in:
    description: "All selections made, Standing By pills visible on both sides."
    transitions_to: [action_menu]
    detectors: [TeamPreviewDetector, PreparingForBattleDetector]
    readers:
      TeamPreviewReader:
        fields:
          own_species:
            type: array
            items: string
            length: 6
          opponent_species:
            type: array
            items: string
            length: 6

  # ── In-battle ──────────────────────────────────────────────
  # Singles and doubles share directories. Readers handle 1 or 2
  # mons on each side (doubles with 1 remaining looks like singles).

  action_menu:
    description: "FIGHT / POKEMON buttons visible. Singles or doubles."
    transitions_to: [move_select, pokemon_switch]
    detectors: [ActionMenuDetector]
    readers:
      BattleHUDReader:
        fields:
          opponent_species:
            type: array
            items: string
            length: 2
            description: "Slot 0 (left), slot 1 (right). Singles: leave slot 1 blank."
          opponent_hp_pct:
            type: array
            items: int
            length: 2
            description: "Slot 0 (left), slot 1 (right). Singles: leave slot 1 blank."
          own_species:
            type: array
            items: string
            length: 2
            description: "Slot 0 (left), slot 1 (right). Singles: leave slot 1 blank."
          own_hp_current:
            type: array
            items: int
            length: 2
            description: "Current HP per slot. Slot 0 (left), slot 1 (right). Singles: leave slot 1 blank."
          own_hp_max:
            type: array
            items: int
            length: 2
            description: "Max HP per slot. Slot 0 (left), slot 1 (right). Singles: leave slot 1 blank."

  move_select:
    description: "4-move panel active. PP visible. Mega evo toggle possible. Singles or doubles."
    transitions_to: [target_select, action_menu]
    detectors: [MoveSelectDetector]
    readers:
      MoveNameReader:
        fields:
          moves:
            type: array
            items: string
            length: 4
      MoveSelectCursorSlot:
        fields:
          slot:
            type: int
            min: 0
            max: 3
      ActiveHUDSlot:
        fields:
          slot:
            type: int
            min: -1
            max: 1
            description: "Doubles only: which own HUD pill is highlighted (0=left, 1=right). -1 = singles or no active outline."
      BattleHUDReader:
        fields:
          opponent_species:
            type: array
            items: string
            length: 2
            description: "Slot 0 (left), slot 1 (right). Singles: leave slot 1 blank."
          opponent_hp_pct:
            type: array
            items: int
            length: 2
            description: "Slot 0 (left), slot 1 (right). Singles: leave slot 1 blank."
          own_species:
            type: array
            items: string
            length: 2
            description: "Slot 0 (left), slot 1 (right). Singles: leave slot 1 blank."
          own_hp_current:
            type: array
            items: int
            length: 2
            description: "Current HP per slot. Slot 0 (left), slot 1 (right). Singles: leave slot 1 blank."
          own_hp_max:
            type: array
            items: int
            length: 2
            description: "Max HP per slot. Slot 0 (left), slot 1 (right). Singles: leave slot 1 blank."

  target_select:
    description: "Target selection modal after picking a move in doubles. Shows mons with HP, effectiveness, and selected move name."
    transitions_to: [action_menu]
    detectors: []
    readers:
      TargetSelectReader:
        fields:
          move:
            type: string
          targets:
            type: array
            items: string
          target_hp:
            type: array
            items: string
          effectiveness:
            type: array
            items: string
          selected_target:
            type: int

  pokemon_switch:
    description: "Choosing which mon to switch to (voluntary or forced). Singles or doubles."
    transitions_to: [action_menu]
    detectors: []
    readers: {}

  # ── Shared battle states ───────────────────────────────────

  result_screen:
    description: "Battle ended. WON! or LOST displayed."
    transitions_to: [post_match]
    detectors: [ResultScreenDetector]
    readers:
      ResultReader:
        fields:
          won:
            type: bool

  post_match:
    description: "Quit Battling / Edit Team / Continue Battling buttons."
    transitions_to: [pre_match]
    detectors: [PostMatchScreenDetector]
    readers: {}

  # ── Non-battle (menu) ──────────────────────────────────────

  main_menu:
    description: "Game home screen with Battle / Box / Train / Recruit / Shop tiles."
    transitions_to: [battle_mode_menu]
    detectors: [MainMenuDetector]
    readers: {}

  battle_mode_menu:
    description: "Battle mode list: Ranked Battles / Casual Battles / Private Battles / Online Competitions / Battle Data."
    transitions_to: [ranked_format_select, main_menu]
    detectors: []
    readers: {}

  ranked_format_select:
    description: "Choose between Single Battle and Double Battle for ranked."
    transitions_to: [pre_match, battle_mode_menu]
    detectors: []
    readers: {}

  pre_match:
    description: "Pre-match staging screen: selected team displayed with Begin Matchmaking and Change Team buttons."
    transitions_to: [team_select, searching_for_battle, ranked_format_select]
    detectors: []
    readers: {}

  moves_and_more:
    description: "Moves & More 2x3 grid showing team summary."
    transitions_to: [team_select]
    detectors: [MovesMoreDetector]
    readers:
      TeamSummaryReader:
        fields:
          species:
            type: array
            items: string
            length: 6

# ── Overlays (not screens in the state machine) ─────────────

overlays:

  communicating:
    description: "Communicating... text visible, waiting for opponent's turn submission. Appears over in-battle screens (typically after move_select)."
    readers: {}

  battle_log:
    description: "Text bar overlay during battle. Can appear over any in-battle screen."
    readers:
      BattleLogReader:
        fields:
          event_type:
            type: string

  ability_item:
    description: "Ability activation or item notification popup during battle."
    readers:
      AbilityItemReader:
        fields:
          pokemon:
            type: string
          name:
            type: string
          kind:
            type: string
