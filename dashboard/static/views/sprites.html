<div class="view" id="view-sprites">

    <div class="subtitle">Opponent species in Team Preview are matched against the 272-sprite reference atlas via cropped RMSD.</div>

    <h2 style="margin-top:24px; font-size:14px;">Examples</h2>
    <div id="sprites-examples" style="margin-top:8px;">
        <div style="color:#484f58; font-size:12px;">Loading...</div>
    </div>

    <h2 style="margin-top:32px; font-size:14px;">All references <span id="sprites-count" style="color:#8b949e; font-weight:normal; font-size:12px;"></span></h2>
    <div style="display:flex; gap:8px; margin:8px 0;">
        <input id="sprites-filter" type="text" placeholder="Filter by name (e.g. charizard, mega)" style="flex:1; max-width:320px; background:#0d1117; border:1px solid #30363d; color:#c9d1d9; padding:6px 10px; border-radius:3px; font-family:inherit; font-size:12px;">
