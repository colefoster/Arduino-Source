<div class="view" id="view-teampreview">
    <h1>Team Preview Reader</h1>
    <div class="subtitle">Own species (OCR) + Opponent sprites (image matching). Label and review detections.</div>
    <div style="display:flex; gap:8px; align-items:center; margin-bottom:12px;">
        <select id="tp-source" style="width:250px; background:#0d1117; border:1px solid #30363d; border-radius:4px; padding:5px 8px; color:#c9d1d9; font-size:12px;">
            <option value="">Loading sources...</option>
        </select>
        <span style="font-size:11px; color:#8b949e;" id="tp-count"></span>
    </div>
    <!-- Thumbnail ribbon -->
    <div style="display:flex; gap:4px; overflow-x:auto; padding:4px 0; margin-bottom:12px; border:1px solid #21262d; border-radius:6px; background:#0d1117; max-height:80px;" id="tp-ribbon"></div>
    <!-- Main content: image + crops -->
    <div id="tp-content" style="display:none;">
        <div style="display:flex; gap:16px; align-items:flex-start;">
            <!-- Full screenshot -->
            <div style="flex:1; min-width:0;">
                <div style="position:relative; display:inline-block; width:100%;">
                    <img id="tp-image" style="width:100%; border-radius:6px; border:1px solid #30363d;">
                    <div id="tp-overlays" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;"></div>
                </div>
                <div style="font-size:11px; color:#8b949e; margin-top:4px;" id="tp-filename"></div>
            </div>
            <!-- Side panel: crops + labels -->
            <div style="width:320px; flex-shrink:0;">
                <div style="background:#161b22; border:1px solid #30363d; border-radius:8px; padding:12px; margin-bottom:12px;">
                    <div style="font-size:11px; color:#58a6ff; font-weight:bold; margin-bottom:8px;">Own Team (OCR)</div>
                    <div id="tp-own-crops" style="display:grid; grid-template-columns:1fr 1fr; gap:6px;"></div>
                </div>
                <div style="background:#161b22; border:1px solid #30363d; border-radius:8px; padding:12px; margin-bottom:12px;">
                    <div style="font-size:11px; color:#d2a8ff; font-weight:bold; margin-bottom:8px;">Opponent Team (Sprites)</div>
                    <div id="tp-opp-crops" style="display:grid; grid-template-columns:1fr 1fr; gap:6px;"></div>
                </div>
                <div style="display:flex; gap:6px;">
                    <button class="btn btn-primary" style="flex:1;" id="tp-save-btn">Save Labels</button>
                    <button class="btn" style="flex:1;" id="tp-export-btn">Export</button>
                </div>
                <div style="font-size:11px; color:#8b949e; margin-top:6px;" id="tp-status"></div>
            </div>
        </div>
    </div>
</div>
