<div class="view" id="view-gallery">
    <h1>OCR Test Gallery</h1>
    <div class="subtitle">Browse test images and ground-truth labels by reader</div>
    <div class="gallery-layout">
        <div class="gallery-sidebar" id="gallery-sidebar">
            <div style="color:#484f58; font-size:12px;">Loading readers...</div>
        </div>
        <div class="gallery-main">
            <div class="gallery-filters" id="gallery-filters" style="display:none;">
                <span style="font-size:11px; color:#8b949e;">Filter:</span>
                <button class="btn gallery-filter-btn active" data-filter="all">All</button>
                <button class="btn gallery-filter-btn" data-filter="true">True</button>
                <button class="btn gallery-filter-btn" data-filter="false">False</button>
                <button class="btn gallery-filter-btn" data-filter="partial">Partial</button>
            </div>
            <div class="gallery-grid" id="gallery-grid">
                <div style="color:#484f58; font-size:12px;">Select a reader from the sidebar</div>
            </div>
        </div>
    </div>
</div>
